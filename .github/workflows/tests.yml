name: Laravel PayPal
on: [push, pull_request]
jobs:
  paypal:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl
          coverage: ${{ matrix.php == '8.5' && 'pcov' || 'none' }}
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: php-${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Run tests
        run: ./vendor/bin/pest --ci ${{ matrix.php == '8.5' && '--coverage --coverage-clover coverage.xml' || '' }}

      - name: Install PHP Coveralls library
        env:
          PHP_VERSION: ${{ matrix.php }}
        run:
          composer global require --dev php-coveralls/php-coveralls
      - name: Upload coverage results to Coveralls
        env:
          PHP_VERSION: ${{ matrix.php }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_TOKEN }}
          COVERALLS_PARALLEL: true
          COVERALLS_FLAG_NAME: php-${{ matrix.php }}
        run:
          php-coveralls -v
  coveralls-finish:
    needs: [paypal]
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.github_token }}
        parallel-finished: true
