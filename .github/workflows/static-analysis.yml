name: Static Analysis

on:
  push:
  pull_request:

jobs:
  phpstan:
    runs-on: ubuntu-latest

    name: PHPStan

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: curl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: php-8.5-composer-${{ hashFiles('composer.lock') }}
          restore-keys: php-8.5-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Run PHPStan
        run: php -d memory_limit=512M ./vendor/bin/phpstan analyse --configuration=phpstan.neon.dist
